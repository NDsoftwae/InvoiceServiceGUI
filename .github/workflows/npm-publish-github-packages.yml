name: Angular CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Build-And-Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular app
        run: |
          npm run build -- \
            --configuration production \
            --base-href /

      # 🔴 IMPORTANT: replace "invoice-panel" with YOUR Angular project name
      # (from angular.json → "projects" → "<name>")
      - name: Prepare build files
        run: |
          mkdir deploy
          cp -r dist/invoice-panel/* deploy/

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "deploy/*"
          target: "/var/www/invoice-panel"

      - name: Fix permissions (optional but recommended)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            sudo chown -R www-data:www-data /var/www/invoice-panel
            sudo chmod -R 755 /var/www/invoice-panel

      - name: Restart nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            echo "Restarting nginx..."
            sudo systemctl restart nginx
